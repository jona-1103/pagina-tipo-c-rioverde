name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/pagina-tipo-c-rioverde

            git pull origin main

            npm install

            npm run build

            rm -rf /home/tipocrioverde/htdocs/tipocrioverde.com/*

            cp -r dist/* /home/tipocrioverde/htdocs/tipocrioverde.com/

            chown -R tipocrioverde:tipocrioverde /home/tipocrioverde/htdocs/tipocrioverde.com

            chmod -R 755 /home/tipocrioverde/htdocs/tipocrioverde.com
